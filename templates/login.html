<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン - 資料作成ツール</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'Noto Sans JP', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', 'Noto Sans JP', sans-serif; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">

  <div class="w-full max-w-sm mx-auto px-6">
    <!-- Logo & Title -->
    <div class="text-center mb-8">
      <div class="w-14 h-14 rounded-2xl bg-indigo-600 flex items-center justify-center mx-auto mb-4">
        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/>
        </svg>
      </div>
      <h1 class="text-xl font-bold text-gray-900">資料作成ツール</h1>
      <p class="text-sm text-gray-500 mt-1">ログインしてください</p>
    </div>

    <!-- Login Card -->
    <div class="bg-white rounded-2xl border border-gray-200 p-6 shadow-sm">
      {% if error %}
      <div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-xl flex items-center gap-2">
        <svg class="w-4 h-4 text-red-500 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z"/>
        </svg>
        <span class="text-sm text-red-700">{{ error }}</span>
      </div>
      {% endif %}

      <form method="POST" action="/login">
        <div class="mb-5">
          <label for="password" class="block text-sm font-medium text-gray-700 mb-2">パスワード</label>
          <input type="password" id="password" name="password" required autofocus
                 class="w-full bg-white border border-gray-300 rounded-xl px-4 py-3 text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
                 placeholder="パスワードを入力">
        </div>
        <button type="submit"
                class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 active:bg-indigo-800 text-white rounded-xl font-semibold text-sm transition-all shadow-sm">
          ログイン
        </button>
      </form>
    </div>

    <p class="text-center text-xs text-gray-400 mt-6">Claude + Gemini</p>
  </div>

</body>
</html>

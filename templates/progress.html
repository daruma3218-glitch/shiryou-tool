<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>処理中... - 資料作成ツール</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { sans: ['Inter', 'Noto Sans JP', 'sans-serif'] } } }
    }
  </script>
  <style>
    body { font-family: 'Inter', 'Noto Sans JP', sans-serif; }
    .spin { animation: spin 2s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .pulse-ring { animation: pulseRing 2s ease-out infinite; }
    @keyframes pulseRing { 0% { transform: scale(0.9); opacity: 1; } 100% { transform: scale(1.8); opacity: 0; } }
    .log-enter { animation: logSlideIn 0.3s ease-out; }
    @keyframes logSlideIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
    #activityFeed { max-height: 320px; overflow-y: auto; scrollbar-width: thin; }
    #activityFeed::-webkit-scrollbar { width: 4px; }
    #activityFeed::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 2px; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- Navbar -->
  <nav class="bg-white border-b border-gray-200">
    <div class="max-w-3xl mx-auto px-6 h-14 flex items-center gap-2.5">
      <a href="/" class="flex items-center gap-2.5 hover:opacity-80 transition">
        <div class="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center">
          <svg class="w-4.5 h-4.5 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/></svg>
        </div>
        <span class="font-semibold text-gray-900 text-[15px]">資料作成ツール</span>
      </a>
    </div>
  </nav>

  <div class="max-w-xl mx-auto px-6 py-16">

    <!-- Status Header -->
    <div class="text-center mb-10" id="statusHeader">
      <div class="relative inline-flex items-center justify-center mb-5">
        <div class="w-16 h-16 rounded-2xl bg-indigo-100 flex items-center justify-center">
          <svg id="spinnerIcon" class="w-7 h-7 text-indigo-600 spin" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182"/>
          </svg>
        </div>
        <div class="absolute inset-0 rounded-2xl bg-indigo-200 pulse-ring" id="pulseRing"></div>
      </div>
      <h1 class="text-xl font-bold text-gray-900" id="statusTitle">資料を作成しています</h1>
      <p class="text-sm text-gray-500 mt-1.5" id="statusMessage">セットアップ中...</p>
    </div>

    <!-- Progress Bar -->
    <div class="bg-white rounded-2xl border border-gray-200 p-5 mb-8">
      <div class="flex justify-between text-xs font-medium text-gray-500 mb-2.5">
        <span>進捗</span>
        <span id="percentText">0%</span>
      </div>
      <div class="w-full bg-gray-100 rounded-full h-2 overflow-hidden">
        <div id="progressBar" class="h-full bg-indigo-500 rounded-full transition-all duration-700 ease-out" style="width: 0%"></div>
      </div>
    </div>

    <!-- Phase Steps -->
    <div class="bg-white rounded-2xl border border-gray-200 overflow-hidden" id="phases">
      <div id="phase-0" class="p-4 border-b border-gray-100 transition-all phase-item">
        <div class="flex items-center gap-3.5">
          <div id="icon-0" class="w-9 h-9 rounded-xl bg-gray-100 text-gray-400 flex items-center justify-center text-xs font-bold flex-shrink-0 transition-all">0</div>
          <div class="min-w-0">
            <div class="text-sm font-medium text-gray-900">セットアップ</div>
            <div class="text-xs text-gray-400">原稿分析・キーワード抽出</div>
          </div>
        </div>
      </div>

      <div id="phase-1" class="p-4 border-b border-gray-100 transition-all phase-item">
        <div class="flex items-center gap-3.5">
          <div id="icon-1" class="w-9 h-9 rounded-xl bg-gray-100 text-gray-400 flex items-center justify-center text-xs font-bold flex-shrink-0 transition-all">1</div>
          <div class="min-w-0">
            <div class="text-sm font-medium text-gray-900">並行リサーチ</div>
            <div class="text-xs text-gray-400">X/Twitter, YouTube, Web素材, 図解画像</div>
          </div>
        </div>
        <div id="agents" class="mt-3 ml-[52px] hidden">
          <div class="grid grid-cols-2 gap-2">
            <div class="text-xs bg-sky-50 text-sky-700 rounded-lg px-3 py-2 flex items-center gap-2">
              <span class="w-1.5 h-1.5 bg-sky-400 rounded-full animate-pulse"></span>X/Twitter
            </div>
            <div class="text-xs bg-red-50 text-red-700 rounded-lg px-3 py-2 flex items-center gap-2">
              <span class="w-1.5 h-1.5 bg-red-400 rounded-full animate-pulse"></span>YouTube
            </div>
            <div class="text-xs bg-emerald-50 text-emerald-700 rounded-lg px-3 py-2 flex items-center gap-2">
              <span class="w-1.5 h-1.5 bg-emerald-400 rounded-full animate-pulse"></span>Web素材
            </div>
            <div class="text-xs bg-violet-50 text-violet-700 rounded-lg px-3 py-2 flex items-center gap-2">
              <span class="w-1.5 h-1.5 bg-violet-400 rounded-full animate-pulse"></span>図解生成
            </div>
          </div>
        </div>
      </div>

      <div id="phase-2" class="p-4 border-b border-gray-100 transition-all phase-item">
        <div class="flex items-center gap-3.5">
          <div id="icon-2" class="w-9 h-9 rounded-xl bg-gray-100 text-gray-400 flex items-center justify-center text-xs font-bold flex-shrink-0 transition-all">2</div>
          <div class="min-w-0">
            <div class="text-sm font-medium text-gray-900">追加画像生成</div>
            <div class="text-xs text-gray-400">リアル画像30枚 (Gemini)</div>
          </div>
        </div>
      </div>

      <div id="phase-3" class="p-4 transition-all phase-item">
        <div class="flex items-center gap-3.5">
          <div id="icon-3" class="w-9 h-9 rounded-xl bg-gray-100 text-gray-400 flex items-center justify-center text-xs font-bold flex-shrink-0 transition-all">3</div>
          <div class="min-w-0">
            <div class="text-sm font-medium text-gray-900">演出AIエージェント</div>
            <div class="text-xs text-gray-400">統合・構成設計・HTML出力</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Activity Feed -->
    <div class="mt-6 bg-white rounded-2xl border border-gray-200 overflow-hidden" id="activitySection">
      <div class="px-4 py-3 border-b border-gray-100 flex items-center gap-2">
        <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 12h16.5m-16.5 3.75h16.5M3.75 19.5h16.5M5.625 4.5h12.75a1.875 1.875 0 010 3.75H5.625a1.875 1.875 0 010-3.75z"/></svg>
        <span class="text-xs font-semibold text-gray-500 uppercase tracking-wider">アクティビティ</span>
        <span id="logCount" class="ml-auto text-xs text-gray-400">0件</span>
      </div>
      <div id="activityFeed" class="p-3 space-y-1">
        <div id="emptyLogs" class="text-center py-6 text-xs text-gray-400">待機中...</div>
      </div>
    </div>

    <!-- Result -->
    <div id="resultCard" class="hidden mt-8 bg-white rounded-2xl border-2 border-emerald-200 p-8 text-center">
      <div class="w-14 h-14 mx-auto mb-4 rounded-2xl bg-emerald-100 flex items-center justify-center">
        <svg class="w-7 h-7 text-emerald-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      </div>
      <h2 class="text-lg font-bold text-gray-900 mb-1">資料が完成しました</h2>
      <p class="text-sm text-gray-500 mb-6">ブラウザで閲覧・共有できます</p>
      <a id="resultLink" href="#" class="inline-flex items-center gap-2 px-8 py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-semibold text-sm transition shadow-sm">
        資料を見る
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3"/></svg>
      </a>
      <div class="mt-4">
        <a href="/" class="text-sm text-gray-400 hover:text-gray-600 transition">トップに戻る</a>
      </div>
    </div>

    <!-- Error -->
    <div id="errorCard" class="hidden mt-8 bg-white rounded-2xl border-2 border-red-200 p-8 text-center">
      <div class="w-14 h-14 mx-auto mb-4 rounded-2xl bg-red-100 flex items-center justify-center">
        <svg class="w-7 h-7 text-red-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z"/></svg>
      </div>
      <h2 class="text-lg font-bold text-gray-900 mb-1">エラーが発生しました</h2>
      <p id="errorText" class="text-sm text-gray-500"></p>
      <a href="/" class="inline-block mt-5 text-sm text-indigo-600 hover:underline">トップに戻る</a>
    </div>
  </div>

  <script>
    const jobId = '{{ job_id }}';
    const checkmark = '<svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/></svg>';
    let logOffset = 0;
    let isFinished = false;

    const categoryConfig = {
      setup:   { icon: '&#9881;',  color: 'text-gray-500',   bg: 'bg-gray-50' },
      ai:      { icon: '&#9733;',  color: 'text-indigo-600', bg: 'bg-indigo-50' },
      twitter: { icon: '&#120143;', color: 'text-sky-600',    bg: 'bg-sky-50' },
      youtube: { icon: '&#9654;',  color: 'text-red-600',    bg: 'bg-red-50' },
      web:     { icon: '&#127760;', color: 'text-emerald-600', bg: 'bg-emerald-50' },
      image:   { icon: '&#128247;', color: 'text-violet-600', bg: 'bg-violet-50' },
      system:  { icon: '&#8505;',  color: 'text-gray-600',   bg: 'bg-gray-50' },
      error:   { icon: '&#9888;',  color: 'text-red-600',    bg: 'bg-red-50' },
      complete:{ icon: '&#10004;', color: 'text-emerald-600', bg: 'bg-emerald-50' },
    };

    function renderLog(entry) {
      const cfg = categoryConfig[entry.category] || categoryConfig.system;
      const detail = entry.detail ? `<span class="text-gray-400 ml-1">${entry.detail}</span>` : '';
      return `<div class="log-enter flex items-start gap-2 px-2 py-1.5 rounded-lg ${cfg.bg}">
        <span class="flex-shrink-0 w-5 h-5 flex items-center justify-center text-xs ${cfg.color}">${cfg.icon}</span>
        <div class="min-w-0 flex-1">
          <span class="text-xs font-medium text-gray-800">${entry.message}</span>${detail}
        </div>
        <span class="flex-shrink-0 text-[10px] text-gray-400 tabular-nums mt-0.5">${entry.time}</span>
      </div>`;
    }

    async function fetchLogs() {
      try {
        const res = await fetch(`/api/logs/${jobId}?since=${logOffset}`);
        const data = await res.json();
        if (data.logs && data.logs.length > 0) {
          const feed = document.getElementById('activityFeed');
          const empty = document.getElementById('emptyLogs');
          if (empty) empty.remove();

          data.logs.forEach(entry => {
            feed.insertAdjacentHTML('beforeend', renderLog(entry));
          });
          logOffset = data.total;
          document.getElementById('logCount').textContent = data.total + '件';
          // Auto-scroll to bottom
          feed.scrollTop = feed.scrollHeight;
        }
      } catch (e) {}
      if (!isFinished) setTimeout(fetchLogs, 1500);
    }

    async function checkProgress() {
      try {
        const res = await fetch(`/api/progress/${jobId}`);
        const data = await res.json();

        const pct = Math.max(0, Math.min(100, data.percent || 0));
        document.getElementById('progressBar').style.width = pct + '%';
        document.getElementById('percentText').textContent = pct + '%';
        document.getElementById('statusMessage').textContent = data.message || '';

        const currentPhase = data.phase;
        for (let i = 0; i <= 3; i++) {
          const el = document.getElementById(`phase-${i}`);
          const icon = document.getElementById(`icon-${i}`);
          if (i < currentPhase) {
            el.style.background = '#f0fdf4';
            icon.className = 'w-9 h-9 rounded-xl bg-emerald-100 text-emerald-600 flex items-center justify-center text-xs font-bold flex-shrink-0';
            icon.innerHTML = checkmark;
          } else if (i === currentPhase && data.status === 'running') {
            el.style.background = '#eef2ff';
            icon.className = 'w-9 h-9 rounded-xl bg-indigo-100 text-indigo-600 flex items-center justify-center text-xs font-bold flex-shrink-0';
          }
        }

        if (currentPhase === 1) {
          document.getElementById('agents').classList.remove('hidden');
        }

        if (data.status === 'completed') {
          isFinished = true;
          document.getElementById('statusTitle').textContent = '完成しました';
          document.getElementById('spinnerIcon').classList.remove('spin');
          document.getElementById('pulseRing').classList.remove('pulse-ring');
          document.getElementById('resultCard').classList.remove('hidden');
          document.getElementById('resultLink').href = `/results/${jobId}/`;
          document.title = '完了 - 資料作成ツール';
          for (let i = 0; i <= 3; i++) {
            const el = document.getElementById(`phase-${i}`);
            const icon = document.getElementById(`icon-${i}`);
            el.style.background = '#f0fdf4';
            icon.className = 'w-9 h-9 rounded-xl bg-emerald-100 text-emerald-600 flex items-center justify-center text-xs font-bold flex-shrink-0';
            icon.innerHTML = checkmark;
          }
          fetchLogs(); // Final log fetch
          return;
        }

        if (data.status === 'error') {
          isFinished = true;
          document.getElementById('statusTitle').textContent = 'エラーが発生しました';
          document.getElementById('spinnerIcon').classList.remove('spin');
          document.getElementById('pulseRing').classList.remove('pulse-ring');
          document.getElementById('errorCard').classList.remove('hidden');
          document.getElementById('errorText').textContent = data.message;
          document.title = 'エラー - 資料作成ツール';
          fetchLogs(); // Final log fetch
          return;
        }

        setTimeout(checkProgress, 2000);
      } catch (err) {
        setTimeout(checkProgress, 5000);
      }
    }

    checkProgress();
    fetchLogs();
  </script>
</body>
</html>
